<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MONTE - SJDM Travel Guide</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Sidebar Styling */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 2000;
            top: 0; left: 0; background-color: white; overflow-x: hidden;
            transition: 0.3s; padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }
        .sidebar-content { padding: 20px; }
        .sidebar a { padding: 10px; text-decoration: none; font-size: 18px; color: #333; display: block; }
        .closebtn { position: absolute; top: 10px; right: 25px; font-size: 36px !important; cursor: pointer; }

        /* Trip Planner UI (Top) */
        .search-container {
            position: absolute; top: 15px; left: 15px; right: 15px;
            z-index: 1000; background: white; padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        input {
            padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        input:focus { border-color: #2196F3; }
        
        .btn-plan {
            background: #2196F3; color: white; border: none; padding: 10px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Menu Button */
        .menu-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            background: #2196F3; color: white; padding: 15px;
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer; display: flex; align-items: center;
        }

        /* Settings Toggle */
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
    <span class="material-icons closebtn" onclick="closeNav()">close</span>
    <div class="sidebar-content">
        <h3>Settings</h3>
        <div class="setting-item">
            <span>Show Traffic</span>
            <input type="checkbox" id="trafficToggle">
        </div>
        <div class="setting-item">
            <span>Night Mode</span>
            <input type="checkbox" id="darkMode">
        </div>
        <hr>
        <a href="#"><span class="material-icons">info</span> About MONTE</a>
        <a href="#"><span class="material-icons">help</span> Help Center</a>
    </div>
</div>

<div class="search-container">
    <div class="input-group">
        <input type="text" id="startLoc" placeholder="Where are you from? (e.g. Muzon)">
        <input type="text" id="endLoc" placeholder="Where do you want to go? (e.g. Starmall)">
    </div>
    <button class="btn-plan" onclick="planTrip()">Find Routes</button>
</div>

<div id="map"></div>

<div class="menu-btn" onclick="openNav()">
    <span class="material-icons">settings</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize Map
    const map = L.map('map', { zoomControl: false }).setView([14.81, 121.05], 14);
    
    const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© MONTE Project'
    }).addTo(map);

    // 2. Sidebar Functions
    function openNav() { document.getElementById("mySidebar").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

    // 3. Load the Route (Muzon - Starmall)
    fetch('MUZON - STARMALL MODERN JEEP.geojson')
        .then(res => res.json())
        .then(data => {
            const route = L.geoJSON(data, {
                style: { color: '#2196F3', weight: 6, opacity: 0.8 },
                onEachFeature: (f, l) => {
                    l.bindPopup("<b>Modern Jeepney</b><br>Fare: ₱15.00");
                }
            }).addTo(map);
        });

    // 4. Trip Planning Simulation
    function planTrip() {
        const from = document.getElementById('startLoc').value;
        const to = document.getElementById('endLoc').value;
        
        if(from && to) {
            alert(`Planning trip from ${from} to ${to}...\nSuggested: Take the Muzon-Starmall Modern Jeepney.`);
            // In a real app, you would filter the GeoJSON here
        } else {
            alert("Please enter both locations.");
        }
    }
</script>

</body>
</html>
